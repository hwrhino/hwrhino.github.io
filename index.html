<style>
:root{--bg:#f7f9fb;--card:#fff;--text:#17212b;--muted:#5c6773;--accent:#2f6690;--line:#d9e2ea}
*{box-sizing:border-box}body{margin:0;font:16px/1.6 Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;background:#ffffffdd;backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.wrap{max-width:1100px;margin:auto;padding:0 24px}
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 0}
nav a{text-decoration:none;color:#333;margin-left:20px}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:40px;padding:80px 0}
.heroimg{border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;min-height:320px;border-radius:12px;color:var(--muted)}
h1{font-size:3rem;margin:.2em 0}.accent{color:var(--accent)}
.btn{display:inline-block;padding:12px 22px;border-radius:6px;text-decoration:none;margin-right:10px}
.primary{background:var(--accent);color:#fff}.ghost{border:1px solid var(--accent);color:var(--accent)}
section{padding:70px 0}h2{font-size:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.card{background:var(--card);padding:22px;border:1px solid var(--line);border-radius:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.stat{text-align:center;background:#fff;padding:20px;border:1px solid var(--line);border-radius:8px}
.project img{width:100%;height:180px;object-fit:cover;background:#e9eef2}
footer{padding:30px;border-top:1px solid var(--line);text-align:center;color:var(--muted)}
@media(max-width:800px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
